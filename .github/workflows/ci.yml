name: Qualidade e segurança

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências de forma reproduzível
        run: npm ci --ignore-scripts

      - name: Auditar dependências de produção
        run: npm audit --omit=dev --audit-level=high

      - name: Validar código e regras de negócio
        run: npm run lint && npm test

      - name: Validar o modelo relacional
        env:
          DATABASE_URL: postgresql://allescorp:allescorp@localhost:5432/allescorp?schema=public
        run: npm run db:validate

      - name: Validar a exportação pública
        env:
          GITHUB_ACTIONS: "true"
        run: npm run build
